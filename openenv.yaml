name: email-triage-env
version: "1.0.0"
description: >
  An OpenEnv environment for training AI agents
  to classify and triage emails in real-world settings.

author: Mamta
tags:
  - openenv
  - email
  - classification
  - real-world
  - nlp

tasks:
  - id: easy
    name: Spam Detection
    difficulty: easy
    description: Classify email as spam or not_spam

  - id: medium
    name: Email Category
    difficulty: medium
    description: Classify into spam/work/finance/personal/emergency

  - id: hard
    name: Priority and Action
    difficulty: hard
    description: Assign priority and action e.g. high_reply, low_delete

action_space:
  type: categorical
  easy: [spam, not_spam]
  medium: [spam, work, finance, personal, emergency]
  hard: [high_reply, high_delete, medium_reply,
         medium_archive, low_delete, low_archive]

observation_space:
  subject: string
  body: string
  sender: string
  task: string
  message: string
  done: boolean
  reward: float

reward_range: [0.0, 1.0]

hardware:
  cpu: 2
  ram: 8GB

endpoints:
  - /health
  - /reset
  - /step
  - /state
  - /tasks
  - /grader
  - /baseline
